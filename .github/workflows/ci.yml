name: React Pizza Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонирование репозитория
      - name: checkout repo
        uses: actions/checkout@v4

      # 2. Node.js
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Установка зависимостей
      - name: install dependencies
        run: npm install

      # 4. Линтинг JS/TS
      - name: run eslint
        run: npm run lint:js

      # 5. Линтинг CSS/SCSS
      - name: run stylelint
        run: npm run lint:css

      # 6. Проверка форматирования
      - name: check prettier
        run: npm run format

      # 7. Тесты
      - name: run tests
        run: npm test -- --watchAll=false

      # 8. Сборка приложения
      - name: build project
        run: npm run build
        env:
          CI: false

      # 9. Сборка Storybook (в build/storybook)
      - name: build storybook
        run: npm run build-storybook

      # 10. Деплой
      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: deploy to github pages
        uses: actions/deploy-pages@v4
